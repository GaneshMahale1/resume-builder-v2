<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Resume Builder</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        margin: 0;
        padding: 40px;
        text-align: center;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        max-width: 600px;
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }
      h1 {
        font-size: 2.5em;
        margin-bottom: 20px;
        background: linear-gradient(45deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        color: transparent;
      }
      p {
        font-size: 1.2em;
        margin-bottom: 30px;
        opacity: 0.8;
      }
      .btn {
        display: inline-block;
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
        padding: 12px 24px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: 600;
        transition: transform 0.2s;
      }
      .btn:hover {
        transform: translateY(-2px);
      }
      .code {
        background: rgba(255, 255, 255, 0.2);
        padding: 20px;
        border-radius: 5px;
        font-family: 'Courier New', monospace;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>Oops! The page you're looking for doesn't exist.</p>
      <p>Let's get you back to the Resume Builder:</p>
      <a href="/resume-builder/" class="btn">Go to Resume Builder</a>
      <div class="code">
        Error: Page not found<br>
        Route: <span id="route-path"></span><br>
        Timestamp: <span id="timestamp"></span>
      </div>
    </div>
    <script>
      // Log the error for debugging
      document.getElementById('route-path').textContent = window.location.pathname;
      document.getElementById('timestamp').textContent = new Date().toISOString();
      
      // Redirect to home after 5 seconds
      setTimeout(() => {
        window.location.href = '/resume-builder/';
      }, 5000);
    </script>
  </body>
</html>
